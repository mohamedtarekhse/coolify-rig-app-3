version: '3.8'

services:
  # MySQL Database
  mysql:
    build:
      context: ..
      dockerfile: docker/Dockerfile.mysql
    container_name: rigways-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: rigways_acm
      MYSQL_USER: rigways_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rigways_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql:/docker-entrypoint-initdb.d
    networks:
      - rigways-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: rigways-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: rigways_user
      DB_PASSWORD: ${MYSQL_PASSWORD:-rigways_password}
      DB_NAME: rigways_acm
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_EXPIRES_SEC: 86400
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE: 10485760
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - rigways-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  rigways-network:
    driver: bridge
